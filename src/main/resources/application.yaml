spring:
  application:
    name: online_course

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:./data/courseDB;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  # JSP View Resolver
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp

  # Security Configuration
  security:
    # Remember-Me cookie settings
    remember-me:
      secret: "online-course-secret-key-change-in-production-32chars!"
      token-validity-seconds: 604800  # 7 days = 7 * 24 * 60 * 60
